name: Release Community App

on:
  workflow_dispatch: # Manual trigger only (Save Quota)
    inputs:
      target_platform:
        description: 'Build target platform'
        required: true
        default: 'macos-latest'
        type: choice
        options:
          - all
          - macos-latest
          - ubuntu-22.04
          - windows-latest
  # push:
  #   tags:
  #     - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin --bundles dmg'
          - platform: 'ubuntu-22.04'
            args: '--bundles deb,appimage,rpm'
          - platform: 'windows-latest'
            args: '--bundles nsis,msi'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Resolve target gate
        id: gate
        shell: bash
        run: |
          TARGET="${{ inputs.target_platform }}"
          PLATFORM="${{ matrix.platform }}"
          if [ -z "$TARGET" ] || [ "$TARGET" = "all" ] || [ "$TARGET" = "$PLATFORM" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
          echo "target_platform=$TARGET matrix_platform=$PLATFORM run=$(cat "$GITHUB_OUTPUT" | tail -n1)"

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'
        with:
          submodules: recursive

      - name: setup node
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        if: steps.gate.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: steps.gate.outputs.run == 'true' && matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf libsqlite3-dev

      - name: install frontend dependencies
        if: steps.gate.outputs.run == 'true'
        working-directory: ./gui
        run: npm ci --no-audit --no-fund

      - name: Build Tauri App
        if: steps.gate.outputs.run == 'true'
        working-directory: ./gui
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run tauri build -- --ci ${{ matrix.args }}

      - name: Collect Bundle Artifacts
        if: steps.gate.outputs.run == 'true'
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          platform="${{ matrix.platform }}"
          out_dir="_bundle_upload"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"

          found=0
          found_dmg=0

          copy_file_matches() {
            local pattern="$1"
            while IFS= read -r -d '' f; do
              found=1
              if [[ "$f" == *.dmg ]]; then
                found_dmg=1
              fi
              local base
              base="$(basename "$f")"
              local safe
              safe="$(echo "$f" | sed 's#^\./##' | tr '/' '__')"
              cp "$f" "$out_dir/$safe"
              echo "collected: $f"
            done < <(find . -type f -name "$pattern" -print0)
          }

          copy_dir_matches() {
            local pattern="$1"
            while IFS= read -r -d '' d; do
              found=1
              local safe
              safe="$(echo "$d" | sed 's#^\./##' | tr '/' '__')"
              cp -R "$d" "$out_dir/$safe"
              echo "collected: $d"
            done < <(find . -type d -name "$pattern" -print0)
          }

          case "$platform" in
            macos-latest)
              copy_file_matches "*.dmg"
              copy_file_matches "*.app.tar.gz"
              copy_dir_matches "*.app"
              ;;
            windows-latest)
              copy_file_matches "*.exe"
              copy_file_matches "*.msi"
              ;;
            ubuntu-22.04)
              copy_file_matches "*.deb"
              copy_file_matches "*.AppImage"
              copy_file_matches "*.rpm"
              ;;
            *)
              echo "Unknown platform: $platform"
              exit 1
              ;;
          esac

          if [ "$found" -eq 0 ]; then
            echo "::error::No bundle artifacts found for platform=$platform"
            echo "Bundle directories discovered:"
            find . -type d -name bundle | sed 's#^\./##' || true
            exit 1
          fi

          if [ "$platform" = "macos-latest" ] && [ "$found_dmg" -eq 0 ]; then
            echo "::error::macOS build completed but no .dmg artifact was produced"
            echo "Bundle files discovered:"
            find . -type f \( -name "*.dmg" -o -name "*.app" -o -name "*.app.tar.gz" \) | sed 's#^\./##' || true
            exit 1
          fi

          echo "bundle_dir=$out_dir" >> "$GITHUB_OUTPUT"

      - name: Upload Workflow Artifacts
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-${{ matrix.platform }}
          if-no-files-found: error
          path: ${{ steps.collect.outputs.bundle_dir }}/**

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v1
        if: steps.gate.outputs.run == 'true' && startsWith(github.ref, 'refs/tags/v')
        with:
          files: ${{ steps.collect.outputs.bundle_dir }}/*
